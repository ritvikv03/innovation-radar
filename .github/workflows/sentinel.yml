name: Fendt PESTEL-EL Sentinel

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push graph updates back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sentinel Pipeline
        run: |
          python sentinel.py --run-once
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRE_CRAWL_API_KEY: ${{ secrets.FIRE_CRAWL_API_KEY }}

      - name: Commit and Push Updates
        env:
          RUN_DATE: ${{ github.run_id }}
        run: |
          git config --global user.name "Sentinel Bot"
          git config --global user.email "bot@fendt-innovation.ai"
          # Stage pipeline artifacts — outputs/ (plural) is the canonical write path.
          # q2_solution/data/signals.db tracks the SQLite temporal store.
          git add \
            outputs/ \
            q2_solution/data/signals.db \
            logs/sentinel.log \
            data/graph.json \
            data/sentinel_state.json || true
          git commit -m "Autonomous Update: run-${RUN_DATE}" || echo "No changes to commit"
          git push
