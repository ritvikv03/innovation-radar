name: Sentinel — Daily Intelligence Sweep

on:
  schedule:
    # Every 6 hours UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip persistence (dry run)"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.11"

jobs:
  scout-ingest:
    name: Scout Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scout pipeline
        env:
          ASTRA_DB_TOKEN: ${{ secrets.ASTRA_DB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python run_pipeline.py --scrape --all-sources

  analyst-brief:
    name: Generate Analyst Brief
    runs-on: ubuntu-latest
    needs: scout-ingest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate strategic brief
        env:
          ASTRA_DB_TOKEN: ${{ secrets.ASTRA_DB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from core.database import SignalDB
          from core.summary_engine import generate_brief_markdown
          from pathlib import Path
          from datetime import datetime, timezone

          db = SignalDB()
          signals = db.get_all()
          if not signals:
              print("No signals in DB — skipping brief generation.")
          else:
              md = generate_brief_markdown(signals)
              out_dir = Path("outputs/reports")
              out_dir.mkdir(parents=True, exist_ok=True)
              ts = datetime.now(timezone.utc).strftime("%Y%m%d_%H%M%S")
              path = out_dir / f"Strategic_Brief_{ts}.md"
              path.write_text(md, encoding="utf-8")
              print(f"Brief written to {path} ({len(signals)} signals)")
          EOF

      - name: Upload brief as artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategic-brief-${{ github.run_id }}
          path: outputs/reports/
          retention-days: 30
          if-no-files-found: warn
